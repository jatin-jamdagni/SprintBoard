services:
  postgres:
    image: postgres:15-alpine
    container_name: sprintboard_db
    environment:
      POSTGRES_USER: sprintboard
      POSTGRES_PASSWORD: sprintboard
      POSTGRES_DB: sprintboard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: