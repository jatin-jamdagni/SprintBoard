services:
  postgres:
    image: postgres:15-alpine
    container_name: sprintboard_db
    environment:
      POSTGRES_USER: sprintboard
      POSTGRES_PASSWORD: sprintboard
      POSTGRES_DB: sprintboard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: sprintboard_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  postgres_data:
  redis_data: